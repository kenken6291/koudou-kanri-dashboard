<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>行動管理ダッシュボード</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="app-header">
  <div class="brand">
    <div class="seal-mini">行</div>
    <h1>行動管理ダッシュボード</h1>
  </div>
  <div class="user-menu">
    <span id="nickname-display" class="mono"></span>
    <button class="link" id="btn-mypage">設定</button>
    <button class="link" id="btn-logout">ログアウト</button>
  </div>
</header>

<div class="app-body">

  <div class="section-title">
    <h2>行動を記録する</h2>
    <span class="note" id="today-label"></span>
  </div>

  <div class="habit-add-row">
    <input type="text" id="new-habit-name" placeholder="新しい行動を追加（例：ストレッチ、読書、日記）" maxlength="30">
    <div class="color-swatches" id="color-swatches"></div>
    <button class="btn shu" id="btn-add-habit">追加</button>
  </div>

  <div id="habit-grid" class="habit-grid" style="margin-top:18px;"></div>
  <div id="habit-empty" class="empty-state" style="display:none;">
    まだ行動が登録されていません。上のフォームから最初の一つを追加しましょう。
  </div>

  <div class="section-title">
    <h2>お気に入りの記録</h2>
    <span class="note">達成した瞬間を保存しておけます</span>
  </div>
  <div id="fav-grid" class="fav-grid"></div>
  <div id="fav-empty" class="empty-state" style="display:none;">
    保存されたお気に入りはまだありません。下の「結果をシェア」から保存できます。
  </div>

  <div class="share-panel">
    <h2>今の結果をシェアする</h2>
    <p>現在の継続状況をまとめて、お気に入り保存やSNSシェアができます。</p>
    <div class="share-summary mono" id="share-summary">読み込み中...</div>
    <div class="share-actions">
      <button class="btn shu" id="btn-save-favorite">★ お気に入りに保存</button>
      <button class="btn secondary" id="btn-share-sns">SNSでシェア</button>
      <button class="btn secondary" id="btn-share-x">Xでシェア</button>
    </div>
  </div>

</div>

<!-- マイページ（設定） -->
<div class="modal-backdrop" id="modal-mypage">
  <div class="modal">
    <h3>設定</h3>
    <div class="field">
      <label>ニックネーム</label>
      <input type="text" id="mp-nickname" maxlength="20">
    </div>
    <button class="btn secondary block" id="btn-save-nickname" style="margin-bottom:22px;">ニックネームを保存</button>

    <div class="field">
      <label>新しいパスワード（変更する場合のみ）</label>
      <div class="pw-field">
        <input type="password" id="mp-password" minlength="8" placeholder="8文字以上">
        <button type="button" class="pw-toggle" data-target="mp-password">表示</button>
      </div>
    </div>
    <button class="btn secondary block" id="btn-save-password" style="margin-bottom:22px;">パスワードを変更</button>

    <hr style="border:none;border-top:1px solid var(--paper-line);margin:18px 0;">
    <button class="btn link" id="btn-delete-account" style="color:var(--shu);">退会（アカウント削除）</button>

    <div class="modal-actions">
      <button class="btn secondary" id="btn-close-mypage">閉じる</button>
    </div>
  </div>
</div>

<!-- 退会確認 -->
<div class="modal-backdrop" id="modal-delete-confirm">
  <div class="modal">
    <h3>本当に退会しますか？</h3>
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:8px;">
      登録した行動・記録・お気に入りはすべて完全に削除され、復元できません。
    </p>
    <div class="modal-actions">
      <button class="btn secondary" id="btn-cancel-delete">キャンセル</button>
      <button class="btn shu" id="btn-confirm-delete">削除して退会する</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/api.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
